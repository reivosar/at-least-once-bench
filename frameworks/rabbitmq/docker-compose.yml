version: '3.8'


services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-bench}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-benchpass}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
  rabbitmq-worker:
    build:
      context: ../..
      dockerfile: frameworks/rabbitmq/worker/Dockerfile
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-bench}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-benchpass}
      DATABASE_URL: "postgres://${POSTGRES_USER:-bench}:${POSTGRES_PASSWORD:-benchpass}@postgres:5432/${POSTGRES_DB:-benchdb}?sslmode=disable"
      DOWNSTREAM_URL: "http://downstream:${DOWNSTREAM_PORT:-8080}"
      METRICS_PORT: "${RABBITMQ_WORKER_METRICS_PORT:-9094}"
    depends_on:
      - rabbitmq
