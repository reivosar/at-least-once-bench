version: '3.8'


services:
  temporal-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - temporal-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 5

  temporal:
    image: temporalio/auto-setup:1.24.0
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
      DB_HOST: temporal-db
      DYNAMIC_CONFIG_FILE_PATH: /etc/temporal/config/dynamicconfig/development.yaml
    depends_on:
      - temporal-db
    ports:
      - "7233:7233"
  temporal-ui:
    image: temporalio/ui:2.26.0
    ports:
      - "${TEMPORAL_UI_PORT:-8083}:8080"
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    depends_on:
      - temporal

  temporal-worker:
    build:
      context: ../..
      dockerfile: frameworks/temporal/worker/Dockerfile
    environment:
      TEMPORAL_HOST: temporal
      TEMPORAL_PORT: 7233
      DATABASE_URL: "postgres://${POSTGRES_USER:-bench}:${POSTGRES_PASSWORD:-benchpass}@postgres:5432/${POSTGRES_DB:-benchdb}?sslmode=disable"
      DOWNSTREAM_URL: "http://downstream:${DOWNSTREAM_PORT:-8080}"
      METRICS_PORT: "${TEMPORAL_WORKER_METRICS_PORT:-9091}"
    depends_on:
      - temporal

volumes:
  temporal-db-data:
