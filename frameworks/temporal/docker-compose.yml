version: '3.8'

networks:
  bench-net:
    external: true

services:
  temporal-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - temporal-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - bench-net

  temporal:
    image: temporalio/auto-setup:1.24.0
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
      DB_HOST: temporal-db
      DYNAMIC_CONFIG_FILE_PATH: /etc/temporal/config/dynamicconfig/development.yaml
    depends_on:
      temporal-db:
        condition: service_healthy
    ports:
      - "7233:7233"
    healthcheck:
      test: ["CMD", "tctl", "health", "status"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - bench-net

  temporal-ui:
    image: temporalio/ui:2.26.0
    ports:
      - "8080:8080"
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    depends_on:
      - temporal
    networks:
      - bench-net

  temporal-worker:
    build:
      context: ../..
      dockerfile: frameworks/temporal/worker/Dockerfile
    environment:
      TEMPORAL_HOST: temporal
      TEMPORAL_PORT: 7233
      DATABASE_URL: "postgres://bench:benchpass@postgres:5432/benchdb?sslmode=disable"
      DOWNSTREAM_URL: "http://downstream:8080"
      METRICS_PORT: "9091"
    depends_on:
      temporal:
        condition: service_healthy
    networks:
      - bench-net

volumes:
  temporal-db-data:
