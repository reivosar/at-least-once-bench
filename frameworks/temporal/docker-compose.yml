version: '3.8'


services:
  temporal-nginx-downstream:
    image: nginx:alpine
    container_name: bench-temporal-nginx-downstream
    volumes:
      - ../../infra/nginx/nginx-http-downstream.conf:/etc/nginx/conf.d/default.conf

  temporal-nginx-postgres:
    image: nginx:alpine
    container_name: bench-temporal-nginx-postgres
    volumes:
      - ../../infra/nginx/nginx-tcp-postgres.conf:/etc/nginx/nginx.conf

  temporal-nginx-broker:
    image: nginx:alpine
    container_name: bench-temporal-nginx-broker
    volumes:
      - ../../infra/nginx/nginx-tcp-temporal.conf:/etc/nginx/nginx.conf
    depends_on:
      - temporal

  temporal-nginx-temporal-db:
    image: nginx:alpine
    container_name: bench-temporal-nginx-temporal-db
    volumes:
      - ../../infra/nginx/nginx-tcp-temporal-db.conf:/etc/nginx/nginx.conf
    depends_on:
      - temporal-db

  temporal-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - temporal-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 5

  temporal:
    image: temporalio/auto-setup:1.24.0
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      DBNAME: temporal
      POSTGRES_SEEDS: temporal-nginx-temporal-db
      DYNAMIC_CONFIG_FILE_PATH: /etc/temporal/config/dynamicconfig/docker.yaml
    depends_on:
      temporal-db:
        condition: service_healthy
      temporal-nginx-temporal-db:
        condition: service_started
    ports:
      - "7233:7233"

  temporal-ui:
    image: temporalio/ui:2.26.0
    ports:
      - "${TEMPORAL_UI_PORT:-8083}:8080"
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    depends_on:
      - temporal

  temporal-worker:
    build:
      context: ../..
      dockerfile: frameworks/temporal/worker/Dockerfile
    container_name: bench-temporal-worker
    restart: on-failure
    ports:
      - "7234:7234"
    environment:
      TEMPORAL_HOST: temporal-nginx-broker
      TEMPORAL_PORT: 7233
      DATABASE_URL: "postgres://${POSTGRES_USER:-bench}:${POSTGRES_PASSWORD:-benchpass}@temporal-nginx-postgres:5432/${POSTGRES_DB:-benchdb}?sslmode=disable"
      DOWNSTREAM_URL: "http://temporal-nginx-downstream:${DOWNSTREAM_PORT:-8080}"
      METRICS_PORT: "${TEMPORAL_WORKER_METRICS_PORT:-9091}"
    depends_on:
      - temporal
      - temporal-nginx-downstream
      - temporal-nginx-postgres
      - temporal-nginx-broker

volumes:
  temporal-db-data:
