version: '3.8'

networks:
  bench-net:
    external: true

services:
  nats:
    image: nats:2.10-alpine
    command:
      - -js
      - -sd
      - /data
    volumes:
      - nats-data:/data
    ports:
      - "${NATS_PORT:-4222}:4222"
      - "${NATS_MONITORING_PORT:-8222}:8222"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8222/varz"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - bench-net

  nats-worker:
    build:
      context: ../..
      dockerfile: frameworks/nats/worker/Dockerfile
    environment:
      NATS_URL: "nats://nats:4222"
      DATABASE_URL: "postgres://${POSTGRES_USER:-bench}:${POSTGRES_PASSWORD:-benchpass}@postgres:5432/${POSTGRES_DB:-benchdb}?sslmode=disable"
      DOWNSTREAM_URL: "http://downstream:${DOWNSTREAM_PORT:-8080}"
      METRICS_PORT: "${NATS_WORKER_METRICS_PORT:-9095}"
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - bench-net

volumes:
  nats-data:
