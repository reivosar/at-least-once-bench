version: '3.8'


services:
  nats:
    image: nats:2.10-alpine
    command:
      - -js
      - -sd
      - /data
    volumes:
      - nats-data:/data
    ports:
      - "${NATS_PORT:-4222}:4222"
      - "${NATS_MONITORING_PORT:-8222}:8222"
  nats-worker:
    build:
      context: ../..
      dockerfile: frameworks/nats/worker/Dockerfile
    environment:
      NATS_URL: "nats://nats:4222"
      DATABASE_URL: "postgres://${POSTGRES_USER:-bench}:${POSTGRES_PASSWORD:-benchpass}@postgres:5432/${POSTGRES_DB:-benchdb}?sslmode=disable"
      DOWNSTREAM_URL: "http://downstream:${DOWNSTREAM_PORT:-8080}"
      METRICS_PORT: "${NATS_WORKER_METRICS_PORT:-9095}"
    depends_on:
      - nats

volumes:
  nats-data:
